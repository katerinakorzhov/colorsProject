<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lacquer&display=swap" rel="stylesheet">

    <title>Colors</title>
    <link rel="stylesheet" href="style.css" />

</head>
<body>
    <header>
        <h1>COLORS</h1>
        <ul id="categories">
            <li id="red">Reds</li>
            <li id="orange">Oranges</li>
            <li id="yellow">Yellows</li>
            <li id="green">Greens</li>
            <li id="blue">Blues</li>
            <li id="purple">Purples</li>
            <li id="neutral">Neutrals</li>
        </ul>
        <div id="nameColor"><p>Name A Color</p></div>
    </header>

    <div id="colors"></div>

        <div id="colorModal">
            <div id="xButton">X</div>
            <div class="titleAndName">
                <h2>Name A Color:</h2>
                <div id="name"></div> 
            </div>
            <div class="colorAndPickers">
                <div id="color"></div>
                <div class="colorPickers">
                    <p>Hue</p>
                    <div id="hue" class="pickerBackground">
                        <input id="huePicker" class="picker" type="range" min="0" max="360" value="0">
                    </div>
                    <p>Value</p>
                    <div id="value" class="pickerBackground">
                        <input id="valuePicker" class="picker" type="range" min="0" max="100" value="50">
                    </div>
                    <p>Saturation</p>
                    <div id="saturation" class="pickerBackground">
                        <input id="saturationPicker" class="picker" type="range" min="0" max="100" value="100">
                    </div>


                </div>
        </div>


    <script type="module" src="colorModal.js"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="color.js"></script>
</body>
</html>
